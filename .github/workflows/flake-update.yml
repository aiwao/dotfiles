name: 'Maintenance: flake update'

on:
  schedule:
    # 06:00 JST
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Update flake lock
        run: nix flake update

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: automation/flake-update
          base: main
          delete-branch: true
          commit-message: 'chore(nix): update flake lock'
          title: 'chore(nix): update flake lock'
          body: |
            Automated daily update for `flake.lock`.

            Scheduled for 06:00 JST.
          labels: dependencies,nix
