name: 'Automation: flake update'

on:
  schedule:
    # 06:00 JST
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get GitHub App bot user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Update flake lock
        run: |
          cp flake.lock "$RUNNER_TEMP/flake.lock.before"
          nix flake update

      - name: Collect package manifests
        run: |
          cp flake.lock "$RUNNER_TEMP/flake.lock.after"

          restore_lock() {
            cp "$RUNNER_TEMP/flake.lock.after" flake.lock
          }
          trap restore_lock EXIT

          cp "$RUNNER_TEMP/flake.lock.before" flake.lock
          python3 -B .github/scripts/flake-package-manifest.py \
            > "$RUNNER_TEMP/flake-packages.before.json"

          restore_lock
          trap - EXIT

          python3 -B .github/scripts/flake-package-manifest.py \
            > "$RUNNER_TEMP/flake-packages.after.json"

      - name: Create pull request body
        run: |
          python3 -B .github/scripts/flake-update-summary.py \
            "$RUNNER_TEMP/flake.lock.before" \
            flake.lock \
            --package-manifest-before "$RUNNER_TEMP/flake-packages.before.json" \
            --package-manifest-after "$RUNNER_TEMP/flake-packages.after.json" \
            > "$RUNNER_TEMP/flake-update-summary.md"

          {
            cat "$RUNNER_TEMP/flake-update-summary.md"
            echo
            echo '<details>'
            echo '<summary>Raw flake.lock diff</summary>'
            echo
            echo '```diff'
            git --no-pager diff -- flake.lock
            echo '```'
            echo
            echo '</details>'
          } > "$RUNNER_TEMP/flake-update-body.md"

      - name: Commit update and create pull request if needed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: automation/update-flake
          base: main
          delete-branch: true
          commit-message: 'chore(nix): update flake.lock'
          committer: '${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-user.outputs.id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>'
          author: '${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-user.outputs.id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>'
          title: 'chore(nix): update flake.lock'
          body-path: ${{ runner.temp }}/flake-update-body.md
          labels: automatic-update
