name: 'Maintenance: flake update'

on:
  schedule:
    # 06:00 JST
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get GitHub App bot user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Cancel if automatic update pull request exists
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          existing_pr="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --label automatic-update \
              --json title,url \
              --jq '[.[] | select(.title | test("^[0-9a-f]{64}$"))] | .[0].url // ""'
          )"

          if [ -n "$existing_pr" ]; then
            echo "Found existing automatic update pull request: $existing_pr"
            gh run cancel "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY"
            sleep 60
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Update flake lock
        run: |
          cp flake.lock "$RUNNER_TEMP/flake.lock.before"
          nix flake update

      - name: Compute flake lock hash
        id: flake-lock
        run: echo "hash=$(sha256sum flake.lock | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Create pull request body
        run: |
          python3 > "$RUNNER_TEMP/flake-update-summary.md" <<'PY'
          import json
          import os
          from pathlib import Path

          before_path = Path(os.environ["RUNNER_TEMP"]) / "flake.lock.before"
          after_path = Path("flake.lock")

          before = json.loads(before_path.read_text())
          after = json.loads(after_path.read_text())

          def locked(node):
              return (node or {}).get("locked")

          def source(node):
              data = locked(node) or {}
              owner = data.get("owner")
              repo = data.get("repo")
              if data.get("type") == "github" and owner and repo:
                  return f"[{owner}/{repo}](https://github.com/{owner}/{repo})"
              if data.get("url"):
                  return f"`{data['url']}`"
              if owner and repo:
                  return f"`{owner}/{repo}`"
              if data.get("type"):
                  return f"`{data['type']}`"
              return ""

          def short_rev(rev):
              return rev[:12]

          def value(node):
              data = locked(node) or {}
              rev = data.get("rev")
              owner = data.get("owner")
              repo = data.get("repo")
              if rev and data.get("type") == "github" and owner and repo:
                  return f"[`{short_rev(rev)}`](https://github.com/{owner}/{repo}/commit/{rev})"
              if rev:
                  return f"`{short_rev(rev)}`"
              if "lastModified" in data:
                  return f"`{data['lastModified']}`"
              if "narHash" in data:
                  return f"`{data['narHash'][:18]}...`"
              return "`missing`"

          def compare(old_node, new_node):
              old = locked(old_node) or {}
              new = locked(new_node) or {}
              old_rev = old.get("rev")
              new_rev = new.get("rev")
              owner = new.get("owner") or old.get("owner")
              repo = new.get("repo") or old.get("repo")
              lock_type = new.get("type") or old.get("type")
              if lock_type == "github" and owner and repo and old_rev and new_rev:
                  url = f"https://github.com/{owner}/{repo}/compare/{old_rev}...{new_rev}"
                  return f"[compare]({url})"
              return ""

          old_nodes = before.get("nodes", {})
          new_nodes = after.get("nodes", {})
          names = sorted(set(old_nodes) | set(new_nodes))
          updates = [
              name
              for name in names
              if locked(old_nodes.get(name)) != locked(new_nodes.get(name))
          ]

          print("# Automated flake.lock update")
          print()

          if updates:
              print("## Updated inputs")
              print()
              print("| Input | Source | Before | After | Diff |")
              print("| --- | --- | --- | --- | --- |")
              for name in updates:
                  old_node = old_nodes.get(name)
                  new_node = new_nodes.get(name)
                  print(
                      f"| `{name}` | {source(new_node or old_node)} | "
                      f"{value(old_node)} | {value(new_node)} | "
                      f"{compare(old_node, new_node)} |"
                  )
          else:
              print("No flake input changes detected.")
          PY

          {
            cat "$RUNNER_TEMP/flake-update-summary.md"
            echo
            echo '<details>'
            echo '<summary>Raw flake.lock diff</summary>'
            echo
            echo '```diff'
            git --no-pager diff -- flake.lock
            echo '```'
            echo
            echo '</details>'
          } > "$RUNNER_TEMP/flake-update-body.md"

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: automation/flake-update
          base: main
          delete-branch: true
          commit-message: 'chore(nix): automatic flake update ${{ steps.flake-lock.outputs.hash }}'
          committer: '${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-user.outputs.id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>'
          author: '${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-user.outputs.id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>'
          title: '${{ steps.flake-lock.outputs.hash }}'
          body-path: ${{ runner.temp }}/flake-update-body.md
          labels: automatic-update
